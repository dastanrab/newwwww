version: '3.9'

services:
  app:
    build: .
    container_name: laravel_app
    restart: always
    volumes:
      - .:/var/www
      - laravel_vendor:/var/www/vendor
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - appnet

  db:
    image: mysql:5.7
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 8uAjiys7mpx7s2rib8ZhgAPQMfMvmwB4VivQj3yEeMDXgvcW9jBu4oaZk8P1nsiEZZAM8
      MYSQL_DATABASE: aniroob
      MYSQL_USER: Gr0PPoybmkbQvYyMKAiRNiD4gMGYz8K2miZoUv3z3
      MYSQL_PASSWORD: 8uAjiys7mpx7s2rib8ZhgAPQMfMvmwB4VivQj3yEeMDXgvcW9jBu4oaZk8P1nsiEZZAM8
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - appnet

  redis:
    image: redis:7
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "RedisStrongPass123"]
    ports:
      - "6379:6379"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  db_data:
