version: '3.9'

services:
  app:
    build: .
    container_name: laravel_app
    restart: always
    volumes:
      - .:/var/www:cached
      - laravel_vendor:/var/www/vendor
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - appnet
    command: >
      sh -c "
        php artisan migrate --force &&
        /usr/bin/supervisord -n
      "

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - appnet

  db:
    image: mysql:5.7
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aniroob
      MYSQL_USER: aniroobDbUser
      MYSQL_PASSWORD: rjDxF05vj3tHOjXV2eXu
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - appnet

  redis:
    image: redis:7
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "RedisStrongPass123"]
    ports:
      - "6379:6379"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  db_data:
  laravel_vendor:
